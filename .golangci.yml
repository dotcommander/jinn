# Self-contained golangci-lint config for jinn (v2).
# Mirrors the ~/go/src workspace policy.
# Source: ~/.claude/rules/go-lint-pack.md

version: "2"

linters:
  enable:
    # Correctness
    - govet
    - staticcheck
    - errcheck
    - ineffassign
    - unused
    # Security
    - gosec
    # Architecture: depguard + forbidigo are per-repo only
    # Strict
    - gocritic
    - gocyclo
    - dupl
    # LLM-Friendly Clean Code
    - gocognit
    - funlen
    - nestif
    - goconst
    - gochecknoinits
    - gochecknoglobals
    - revive
    # Resource Safety
    - bodyclose
    - sqlclosecheck
    - noctx
    # Error Handling
    - errorlint
    - nilerr
    # Correctness
    - exhaustive
    - unparam
    - unconvert
    - copyloopvar
    - fatcontext
    - nakedret
    # Performance
    - perfsprint
    # slog Hygiene
    - sloglint

  settings:
    gocyclo:
      min-complexity: 15
    gocognit:
      min-complexity: 20
    funlen:
      lines: 80
      statements: 50
    nestif:
      min-complexity: 4
    goconst:
      min-len: 2
      min-occurrences: 3
    dupl:
      threshold: 100
    exhaustive:
      check:
        - switch
        - map
    nakedret:
      max-func-lines: 0
    nolintlint:
      require-explanation: true
      require-specific: true
      allow-no-explanation: [funlen, gocognit]
    perfsprint:
      strconcat: false
    sloglint:
      no-global: all
      context: scope
    gosec:
      excludes:
        - G104  # deferred .Close() on read-only file
        - G304  # validated path variables
    govet:
      enable:
        - shadow
    revive:
      rules:
        - name: exported
        - name: unexported-return
        - name: indent-error-flow
        - name: var-naming
        - name: argument-limit
          arguments: [5]
        - name: function-result-limit
          arguments: [3]
        - name: cognitive-complexity
          arguments: [20]
        - name: empty-block
        - name: unnecessary-stmt
        - name: confusing-naming
        - name: confusing-results

  exclusions:
    rules:
      # Test files: relax noisy linters
      - path: _test\.go
        linters:
          - dupl
          - goconst
          - bodyclose
          - noctx
          - funlen
          - gosec
      # Cobra cmd/ dirs: globals are idiomatic
      - path: cmd/
        linters:
          - gochecknoglobals
      # jinn: short dispatch-key/extension literals recur across unrelated
      # switches (const-hoisting them is misleading coupling), and package
      # globals are intentional single-source-of-truth tables (riskTable,
      # mutatingActions, toolFeatures, shellAllowList, exitTable, ...).
      - path: internal/jinn/
        linters:
          - goconst
          - gochecknoglobals
      # jinn tests: table-driven tests and mock servers are intentionally
      # long; complexity linting them is noise.
      - path: internal/jinn/.*_test\.go
        linters:
          - gocognit
          - nestif
          - funlen
          - revive
          - gocyclo

issues:
  max-issues-per-linter: 20
  max-same-issues: 5
  exclude-dirs:
    - vendor
    - generated
    - third_party
